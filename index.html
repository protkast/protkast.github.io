<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048 Telegram Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --cell-bg: rgba(238, 228, 218, 0.35);
            --text-dark: #776e65;
            --text-light: #f9f6f2;
            --tg-theme-bg: var(--tg-theme-bg-color, #faf8ef);
            --tg-theme-text: var(--tg-theme-text-color, #776e65);
            --tg-theme-button: var(--tg-theme-button-color, #8f7a66);
            --tg-theme-button-text: var(--tg-theme-button-text-color, #ffffff);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; /* Отключаем стандартные свайпы Telegram для стабильной игры */
            padding: 10px;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        h1 {
            font-size: 36px;
            font-weight: bold;
            color: var(--tg-theme-button, #8f7a66);
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: var(--grid-bg);
            color: #fff;
            padding: 5px 15px;
            border-radius: 6px;
            text-align: center;
            min-width: 70px;
        }

        .score-title {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
        }

        .score-value {
            font-size: 18px;
            font-weight: bold;
        }

        /* Игровое поле */
        #grid-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--grid-bg);
            border-radius: 8px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border-radius: 6px;
            width: 100%;
            height: 100%;
        }

        /* Плитки */
        .tile {
            position: absolute;
            width: calc((100% - 50px) / 4);
            height: calc((100% - 50px) / 4);
            border-radius: 6px;
            font-weight: bold;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease-in-out, scale 0.1s ease-in-out;
            animation: spawn 0.15s ease-in-out;
        }

        @keyframes spawn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Цвета плиток */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 20px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 20px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 18px; }

        /* Экран Game Over */
        #game-over-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.85);
            border-radius: 8px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        #game-over-overlay h2 {
            font-size: 40px;
            color: #776e65;
        }

        .btn {
            background-color: var(--tg-theme-button);
            color: var(--tg-theme-button-text);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 80%;
            max-width: 250px;
            text-align: center;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-secondary {
            background-color: #f2b179;
            color: white;
        }

        /* Инструкция снизу */
        .footer-info {
            text-align: center;
            font-size: 14px;
            color: var(--tg-theme-text);
            opacity: 0.7;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="score-title">Счет</div>
                    <div id="score" class="score-value">0</div>
                </div>
                <div class="score-box">
                    <div class="score-title">Рекорд</div>
                    <div id="best-score" class="score-value">0</div>
                </div>
            </div>
        </header>

        <div id="grid-container">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

            <div id="game-over-overlay">
                <h2>Игра окончена</h2>
                <button class="btn btn-secondary" id="btn-ad">Продолжить за рекламу</button>
                <button class="btn" id="btn-restart">Начать заново</button>
            </div>
        </div>

        <div class="footer-info">
            Управляйте свайпами по экрану
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем приложение на весь экран

        const gridContainer = document.getElementById('grid-container');
        const scoreDisplay = document.getElementById('score');
        const bestScoreDisplay = document.getElementById('best-score');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const btnRestart = document.getElementById('btn-restart');
        const btnAd = document.getElementById('btn-ad');

        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048-best') || 0;
        let adUsedInThisGame = false; // Ограничение: 1 продолжение за рекламу за сессию

        bestScoreDisplay.textContent = bestScore;

        // --- ЛОГИКА ИГРЫ ---

        function initGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            adUsedInThisGame = false;
            btnAd.style.display = 'block'; 
            scoreDisplay.textContent = 0;
            gameOverOverlay.style.display = 'none';
            removeTilesFromDOM();
            spawnTile();
            spawnTile();
            drawBoard();
        }

        function removeTilesFromDOM() {
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => tile.remove());
        }

        function spawnTile() {
            let emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function drawBoard() {
            removeTilesFromDOM();
            const containerRect = gridContainer.getBoundingClientRect();
            const padding = 10;
            const gap = 10;
            const cellSize = (containerRect.width - (padding * 2) - (gap * 3)) / 4;

            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    let value = board[r][c];
                    if (value > 0) {
                        let tile = document.createElement('div');
                        tile.classList.add('tile');
                        tile.classList.add(value <= 2048 ? `tile-${value}` : 'tile-super');
                        tile.innerText = value;
                        
                        // Позиционирование плиток внутри grid-container
                        const topPos = padding + r * (cellSize + gap);
                        const leftPos = padding + c * (cellSize + gap);
                        
                        tile.style.width = `${cellSize}px`;
                        tile.style.height = `${cellSize}px`;
                        tile.style.top = `${topPos}px`;
                        tile.style.left = `${leftPos}px`;

                        gridContainer.appendChild(tile);
                    }
                }
            }
            scoreDisplay.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                bestScoreDisplay.textContent = bestScore;
                localStorage.setItem('2048-best', bestScore);
            }
        }

        // Вспомогательные функции для движения
        function slide(row) {
            let arr = row.filter(val => val);
            let missing = 4 - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function merge(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;
                }
            }
            return row;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < 4; r++) {
                let original = [...board[r]];
                let slid = slide(board[r]);
                let merged = merge(slid);
                let finalRow = slide(merged);
                board[r] = finalRow;
                if (JSON.stringify(original) !== JSON.stringify(finalRow)) moved = true;
            }
            return moved;
        }

        function rotate() {
            // Поворот матрицы по часовой стрелке
            let nextBoard = Array(4).fill().map(() => Array(4).fill(0));
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    nextBoard[c][3 - r] = board[r][c];
                }
            }
            board = nextBoard;
        }

        function makeMove(direction) {
            let moved = false;
            // 0: влево, 1: вверх, 2: вправо, 3: вниз
            for (let i = 0; i < direction; i++) {
                rotate();
            }
            moved = moveLeft();
            for (let i = 0; i < (4 - direction) % 4; i++) {
                rotate();
            }

            if (moved) {
                spawnTile();
                drawBoard();
                if (isGameOver()) {
                    showGameOver();
                }
            }
        }

        function isGameOver() {
            // Проверка на наличие пустых ячеек
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            // Проверка возможности слияния по горизонтали и вертикали
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 3; c++) {
                    if (board[r][c] === board[r][c + 1]) return false;
                    if (board[c][r] === board[c + 1][r]) return false;
                }
            }
            return true;
        }

        function showGameOver() {
            gameOverOverlay.style.display = 'flex';
        }

        // --- СЕНСОРНОЕ УПРАВЛЕНИЕ (СВАЙПЫ) ---

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            if (gameOverOverlay.style.display === 'flex') return;

            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;

            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;

            // Минимальное расстояние для детекции свайпа
            const threshold = 35;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > threshold) {
                    if (dx > 0) makeMove(2); // Вправо
                    else makeMove(0);        // Влево
                }
            } else {
                if (Math.abs(dy) > threshold) {
                    if (dy > 0) makeMove(3); // Вниз
                    else makeMove(1);        // Вверх
                }
            }
        }, { passive: true });

        // Поддержка стрелочек клавиатуры (для дебага на ПК)
        document.addEventListener('keydown', e => {
            if (gameOverOverlay.style.display === 'flex') return;
            if (e.key === 'ArrowLeft') makeMove(0);
            if (e.key === 'ArrowUp') makeMove(1);
            if (e.key === 'ArrowRight') makeMove(2);
            if (e.key === 'ArrowDown') makeMove(3);
        });

        // --- ИНТЕГРАЦИЯ С РЕКЛАМОЙ ---

        function showAdToContinue() {
            // Telegram WebApp тактильный отклик (вибрация) при открытии
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('warning');
            }

            // Плейсхолдер для рекламной сети (например, Adsgram или Yandex Games)
            // Перед продакшеном замените этот код на вызов SDK вашей рекламной сети.
            
            tg.showPopup({
                title: 'Просмотр рекламы',
                message: 'Реклама загружается... (Плейсхолдер имитирует 2 сек. просмотра)',
                buttons: [{ type: 'close' }]
            });

            // Имитируем успешный просмотр рекламы (через 2 секунды)
            setTimeout(() => {
                // Вызываем функцию награды
                rewardUserAfterAd();
            }, 2000);
        }

        function rewardUserAfterAd() {
            adUsedInThisGame = true;
            btnAd.style.display = 'none'; // Скрываем кнопку повторного просмотра рекламы за этот матч
            gameOverOverlay.style.display = 'none';

            // Награда: Очищаем 4 случайных плитки с наименьшим номиналом на доске, чтобы игрок мог ходить
            let activeTiles = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] > 0) {
                        activeTiles.push({ r, c, val: board[r][c] });
                    }
                }
            }

            // Сортируем по возрастанию номинала
            activeTiles.sort((a, b) => a.val - b.val);

            // Очищаем до 4-х самых мелких плиток
            let tilesToClear = Math.min(activeTiles.length, 4);
            for (let i = 0; i < tilesToClear; i++) {
                let cell = activeTiles[i];
                board[cell.r][cell.c] = 0;
            }

            // Уведомление пользователя через Telegram WebApp
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            spawnTile();
            drawBoard();
        }

        // Кнопки интерфейса
        btnRestart.addEventListener('click', initGame);
        btnAd.addEventListener('click', showAdToContinue);

        // Старт игры
        initGame();
    </script>
</body>
</html>
